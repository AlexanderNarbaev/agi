services:
  # ─── MATRIX Core Application ───
  matrix-core:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "9091:9091"
    environment:
      - QUARKUS_HTTP_PORT=9091
      - QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - QUARKUS_LOG_LEVEL=INFO
    volumes:
      - matrix_snapshots:/tmp/matrix-snapshots
    depends_on:
      - postgres
      - kafka
      - minio
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/matrix", "--help"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── PostgreSQL (Event Journal persistence) ───
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=matrix
      - POSTGRES_USER=matrix
      - POSTGRES_PASSWORD=matrix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrix -d matrix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka (Redpanda — single-node) ───
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.10
    command:
      - redpanda start
      - --smp 1
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://kafka:9092
      - --pandaproxy-addr 0.0.0.0:8082
    ports:
      - "9092:9092"
      - "8082:8082"

  # ─── Redis (cache + pub/sub) ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # ─── MinIO S3-compatible storage ───
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data

  # ─── Observability stack ───
  prometheus:
    image: prom/prometheus:v3.7.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  jaeger:
    image: jaegertracing/all-in-one:1.67.0
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  minio_data:
  matrix_snapshots:
