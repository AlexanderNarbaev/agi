services:
  # ── Message Broker ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment: {ZOOKEEPER_CLIENT_PORT: 2181, ZOOKEEPER_TICK_TIME: 2000}
    ports: ["2181:2181"]
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  # ── Databases ──
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: dev_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: ${PG_PASSWORD:-dev_pass}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  mongodb:
    image: mongo:8
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-dev_pass}
    volumes: [mongodata:/data/db]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  # ── Storage ──
  minio:
    image: minio/minio:latest
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes: [miniodata:/data]
    command: server /data --console-address ":9001"
    profiles: [storage]
  # ── Mocking & Testing ──
  wiremock:
    image: wiremock/wiremock:3.5.4
    ports: ["8089:8080"]
    volumes: ["./wiremock/stubs:/home/wiremock"]
  # ── Auth (optional, uncomment for Keycloak) ──
  # keycloak:
  #   image: quay.io/keycloak/keycloak:26.0
  #   environment:
  #     KEYCLOAK_ADMIN: admin
  #     KEYCLOAK_ADMIN_PASSWORD: admin
  #     KC_DB: postgres
  #     KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
  #     KC_DB_USERNAME: dev_user
  #     KC_DB_PASSWORD: dev_pass
  #   ports: ["8080:8080"]
  #   command: start-dev
  #   depends_on: [postgres]
  #   profiles: [auth]
  # ── AWS Emulation (optional) ──
  # localstack:
  #   image: localstack/localstack:latest
  #   ports: ["4566:4566", "4510-4559:4510-4559"]
  #   environment:
  #     SERVICES: s3,dynamodb,sqs,sns,lambda
  #     DEFAULT_REGION: us-east-1
  #   volumes: ["/var/run/docker.sock:/var/run/docker.sock"]
  #   profiles: [aws]
volumes:
  pgdata:
  mongodata:
  miniodata:
