apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: docker.redpanda.com/redpandadata/redpanda:v24.3.10
          args:
            - redpanda
            - start
            - --smp
            - "1"
            - --reserve-memory
            - 0M
            - --overprovisioned
            - --kafka-addr
            - PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr
            - PLAINTEXT://kafka:9092
          ports:
            - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: matrix-kafka
  namespace: matrix
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
