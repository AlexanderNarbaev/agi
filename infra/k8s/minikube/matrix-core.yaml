apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-core
  namespace: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matrix-core
  template:
    metadata:
      labels:
        app: matrix-core
    spec:
      containers:
        - name: matrix-core
          image: matrix-core:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9091
          env:
            - name: QUARKUS_HTTP_PORT
              value: "9091"
            - name: DB_HOST
              value: "matrix-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_PASS
              value: "matrix"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "matrix-kafka:9092"
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: matrix-core
  namespace: matrix
spec:
  type: NodePort
  selector:
    app: matrix-core
  ports:
    - port: 9091
      targetPort: 9091
      nodePort: 30091
