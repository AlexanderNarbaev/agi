name: MATRIX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21, 25]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and Test
        run: gradle :matrix-core:build

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jdk${{ matrix.java }}
          path: matrix-core/build/reports/tests/

  matrix-micro-c:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile and Test matrix-micro (C)
        run: |
          gcc -std=c11 -Wall -Wextra -Werror \
            -I matrix-micro/src \
            -o matrix-micro/tests/test_mpdt \
            matrix-micro/src/mpdt_neuron.c \
            matrix-micro/tests/test_mpdt.c
          ./matrix-micro/tests/test_mpdt

      - name: Test ldn2h converter
        run: |
          python3 matrix-micro/tools/ldn2h.py matrix-micro/tools/test_sample.ldn /tmp/ldn2h-out
          gcc -std=c11 -Wall -Wextra -Werror \
            -I matrix-micro/src \
            -I /tmp/ldn2h-out \
            -o /tmp/ldn2h-test \
            matrix-micro/src/mpdt_neuron.c \
            matrix-micro/tools/test_ldn2h.c
          /tmp/ldn2h-test

  minecraft-experiment:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Minecraft Experiment
        run: gradle :matrix-core:runMinecraftExperiment

  matrix-operator-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and Test matrix-operator
        run: gradle :matrix-operator:test
