# MATRIX CI/CD Pipeline
# Includes: JVM tests, native compilation, Docker build, coverage gate

name: MATRIX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  # ─── 1. JVM Tests + Coverage ───
  jvm-tests:
    name: JVM Tests + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run unit tests
        run: ./gradlew :matrix-core:test --no-daemon

      - name: Generate coverage report
        run: ./gradlew :matrix-core:jacocoTestReport --no-daemon

      - name: Verify coverage threshold (82%)
        run: ./gradlew :matrix-core:jacocoTestCoverageVerification --no-daemon

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: matrix-core/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── 2. SpotBugs Static Analysis ───
  spotbugs:
    name: SpotBugs Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run SpotBugs
        run: ./gradlew :matrix-core:spotbugsMain --no-daemon

  # ─── 3. Native Image Compilation (Mandrel) ───
  native-build:
    name: Native Image (Mandrel 24)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [jvm-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build native image (container-based, Mandrel 25 + Java 25 LTS)
        run: |
          ./gradlew :matrix-core:quarkusBuild \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.type=native \
            -Dquarkus.native.container-build=true \
            -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder:25.0.1-java25 \
            --no-daemon

      - name: Verify native binary exists
        run: |
          ls -lh matrix-core/build/*-runner
          file matrix-core/build/*-runner

      - name: Test native binary startup
        run: |
          timeout 30 ./matrix-core/build/*-runner --help || true

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: matrix-native-linux-amd64
          path: matrix-core/build/*-runner
          retention-days: 7

  # ─── 4. Native Image Tests ───
  native-tests:
    name: Native Image Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [native-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run native compilation validation tests (JVM mode)
        run: |
          ./gradlew :matrix-core:test \
            --tests "io.matrix.nativeimage.*" \
            -Djunit.jupiter.tags.include=native-compilation \
            --no-daemon

  # ─── 5. Docker Build ───
  docker-build:
    name: Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [jvm-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build uber-jar
        run: |
          ./gradlew :matrix-core:quarkusBuild \
            -Dquarkus.package.jar.type=uber-jar \
            --no-daemon -x test

      - name: Build Docker image
        run: docker build -t matrix-core:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run --rm matrix-core:${{ github.sha }} --help

  # ─── 6. Docker Native Build ───
  docker-native-build:
    name: Docker Native Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [native-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build native image
        run: |
          ./gradlew :matrix-core:quarkusBuild \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.type=native \
            -Dquarkus.native.container-build=true \
            -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder:25.0.1-java25 \
            --no-daemon

      - name: Build native Docker image
        run: docker build -f Dockerfile.native -t matrix-core-native:${{ github.sha }} .

      - name: Test native Docker image
        run: |
          docker run --rm matrix-core-native:${{ github.sha }} --help
