# MATRIX CI/CD Pipeline
# Runs on push/PR, builds + tests + scans + releases
#
# Jobs:
#   1. unit-tests        — every push/PR, Java 25 + Gradle
#   2. integration-tests — main branch only, Docker services
#   3. code-quality      — SpotBugs + JaCoCo coverage ≥ 82%
#   4. docker-build      — build & push to ghcr.io (main only)
#   5. security-scan     — Trivy + OWASP dependency-check
#   6. release           — on tag, create GitHub release

name: MATRIX CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  security-events: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '25'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Xmx4g'

# ─── Concurrency: cancel stale runs on same branch ───
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 1. UNIT TESTS — every push and PR
  # ═══════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run unit tests
        run: ./gradlew :matrix-core:test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: matrix-core/build/reports/tests/test/
          retention-days: 14

      - name: Publish test summary
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'matrix-core/build/test-results/test/*.xml'
          check_name: Unit Test Results
          fail_on_failure: false
          include_passed: true

  # ═══════════════════════════════════════════════════════════════
  # 2. INTEGRATION TESTS — main branch only, requires Docker
  # ═══════════════════════════════════════════════════════════════
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 45
    needs: [unit-tests]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: matrix
          POSTGRES_USER: matrix
          POSTGRES_PASSWORD: matrix
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U matrix -d matrix"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

      kafka:
        image: apache/kafka:3.7.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U matrix; do sleep 1; done
          echo "Waiting for Redis..."
          until redis-cli -h localhost -p 6379 ping; do sleep 1; done
          echo "All services ready"

      - name: Run integration tests
        run: ./gradlew :matrix-core:test -PincludeIntegration --no-daemon
        env:
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/matrix
          QUARKUS_DATASOURCE_USERNAME: matrix
          QUARKUS_DATASOURCE_PASSWORD: matrix
          QUARKUS_REDIS_HOSTS: localhost:6379
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: matrix-core/build/reports/tests/test/
          retention-days: 14

      - name: Publish integration test summary
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'matrix-core/build/test-results/test/*.xml'
          check_name: Integration Test Results
          fail_on_failure: false
          include_passed: true

  # ═══════════════════════════════════════════════════════════════
  # 3. CODE QUALITY — SpotBugs + JaCoCo coverage ≥ 82%
  # ═══════════════════════════════════════════════════════════════
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests + JaCoCo report
        run: ./gradlew :matrix-core:test :matrix-core:jacocoTestReport --no-daemon

      - name: Verify coverage ≥ 82%
        run: ./gradlew :matrix-core:jacocoTestCoverageVerification --no-daemon

      - name: Run SpotBugs analysis
        run: ./gradlew :matrix-core:spotbugsMain --no-daemon
        continue-on-error: true

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: matrix-core/build/reports/jacoco/
          retention-days: 30

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: matrix-core/build/reports/spotbugs/
          retention-days: 30

      - name: Add coverage PR comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.2
        with:
          paths: matrix-core/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 82
          min-coverage-changed-files: 82
          title: Code Coverage Report
          update-comment: true

  # ═══════════════════════════════════════════════════════════════
  # 4. DOCKER BUILD — build & push to ghcr.io (main only)
  # ═══════════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30
    needs: [unit-tests, code-quality]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAVA_VERSION=${{ env.JAVA_VERSION }}

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest
          path: /tmp/digest.txt
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # 5. SECURITY SCANNING — Trivy + OWASP dependency-check
  # ═══════════════════════════════════════════════════════════════
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30
    needs: [docker-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JAR for scanning
        run: ./gradlew :matrix-core:quarkusBuild -Dquarkus.package.jar.type=uber-jar --no-daemon -x test

      - name: Run Trivy vulnerability scan on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: matrix-core/build/
          format: 'HTML'
          out: dependency-check-report
          args: >-
            --failOnCVSS 7
            --suppression config/owasp-suppressions.xml
        continue-on-error: true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: dependency-check-report/
          retention-days: 30

      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # 6. RELEASE — on tag, build artifacts + GitHub release
  # ═══════════════════════════════════════════════════════════════
  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 45
    needs: [unit-tests, code-quality, docker-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set release version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build release JAR
        run: ./gradlew :matrix-core:quarkusBuild -Dquarkus.package.jar.type=uber-jar --no-daemon -x test

      - name: Build native image
        run: ./gradlew :matrix-core:build -Dquarkus.package.type=native --no-daemon -x test
        continue-on-error: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            matrix-core/build/matrix-core-*-runner.jar
            matrix-core/build/native/matrix-core
          draft: false
          prerelease: ${{ contains(env.RELEASE_VERSION, 'alpha') || contains(env.RELEASE_VERSION, 'beta') || contains(env.RELEASE_VERSION, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # NOTIFICATIONS — on failure
  # ═══════════════════════════════════════════════════════════════
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [unit-tests, integration-tests, code-quality, docker-build, security-scan, release]

    steps:
      - name: Send failure notification
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "MATRIX CI/CD Pipeline Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":x: MATRIX CI/CD Pipeline Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>" }
                  ]
                }
              ]
            }
        continue-on-error: true

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `CI/CD Pipeline Failed on ${context.ref.replace('refs/heads/', '')}`;
            const body = `## CI/CD Pipeline Failure

            **Branch:** \`${context.ref.replace('refs/heads/', '')}\`
            **Commit:** \`${context.sha}\`
            **Author:** @${context.actor}
            **Workflow Run:** [View Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            ### Next Steps
            1. Review the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            2. Fix the issue
            3. Push a fix to \`${context.ref.replace('refs/heads/', '')}\`

            ---
            *Auto-generated by MATRIX CI/CD pipeline*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure', 'bug']
            });
