plugins {
    id 'java'
    id 'jacoco'
    id 'io.quarkus' version '3.35.4'
}

group = 'io.matrix'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

repositories {
    mavenCentral()
}

dependencies {
    implementation enforcedPlatform('io.quarkus.platform:quarkus-bom:3.35.4')
    implementation 'io.quarkus:quarkus-arc'
    implementation 'io.quarkus:quarkus-micrometer-registry-prometheus'
    implementation 'io.quarkus:quarkus-opentelemetry'
    implementation 'io.quarkus:quarkus-logging-json'
    implementation 'io.quarkus:quarkus-smallrye-health'
    implementation 'io.quarkus:quarkus-picocli'

    implementation 'org.apache.avro:avro:1.12.0'

    implementation platform('org.apache.pekko:pekko-bom_2.13:1.6.0')
    implementation 'org.apache.pekko:pekko-actor-typed_2.13'
    implementation 'org.apache.pekko:pekko-serialization-jackson_2.13'
    implementation 'org.apache.pekko:pekko-slf4j_2.13'

    testImplementation 'io.quarkus:quarkus-junit5'
    testImplementation 'org.assertj:assertj-core:3.26.0'
    testImplementation 'org.apache.pekko:pekko-actor-testkit-typed_2.13'
}

tasks.withType(Test) {
    useJUnitPlatform()
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        csv.required = false
        html.required = true
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                'io/matrix/MatrixApplication*',
                'io/matrix/MatrixSimulation*',
                'io/matrix/SystemDemo*',
                'io/matrix/MinecraftExperiment*',
                'io/matrix/MatrixTopCommand*',
                'io/matrix/cli/**'
            ])
        }))
    }
}

jacocoTestCoverageVerification {
    violationRules {
        rule {
            limit {
                minimum = 0.82
            }
        }
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                'io/matrix/MatrixApplication*',
                'io/matrix/MatrixSimulation*',
                'io/matrix/SystemDemo*',
                'io/matrix/MinecraftExperiment*',
                'io/matrix/MatrixTopCommand*',
                'io/matrix/cli/**'
            ])
        }))
    }
}
