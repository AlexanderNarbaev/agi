# ─── Logging: plain text console + file for Loki ───
quarkus.log.console.json=false
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.level=INFO
quarkus.log.file.enable=true
quarkus.log.file.path=logs/matrix.log
quarkus.log.file.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.file.level=INFO
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=3
quarkus.log.level=INFO

# ─── Redis ───
redis.uri=${REDIS_URI:redis://localhost:6379}

# ─── OpenTelemetry ───
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=matrix
quarkus.otel.traces.sampler=always_on

# ─── Micrometer / Prometheus ───
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# ─── Health ───
quarkus.smallrye-health.root-path=/q/health

# ─── HTTP ───
quarkus.http.port=${QUARKUS_HTTP_PORT:9091}

# ─── Database (PostgreSQL R2DBC) — prod only ───
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER:matrix}
%prod.quarkus.datasource.password=${DB_PASS:matrix}
%prod.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/matrix

%dev.quarkus.datasource.devservices.enabled=false
%test.quarkus.datasource.devservices.enabled=false

# ─── Native (GraalVM 25 + Quarkus 3.36.1) ───
quarkus.native.additional-build-args=\
  -H:+ReportExceptionStackTraces,\
  -H:ReflectionConfigurationResources=META-INF/native-image/reflect-config.json,\
  -H:ResourceConfigurationResources=META-INF/native-image/resource-config.json,\
  -H:JNIConfigurationResources=META-INF/native-image/jni-config.json,\
  --enable-url-protocols=http,https,\
  -H:+AddAllCharsets

quarkus.native.resources.includes=**

%test.quarkus.http.port=9092
%test.quarkus.log.level=WARN
