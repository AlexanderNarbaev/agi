# ─── Logging: JSON structured ───
quarkus.log.console.json=true
quarkus.log.console.json.excluded-keys=sequence,loggerClassName
quarkus.log.file.enable=true
quarkus.log.file.format=json
quarkus.log.file.path=logs/matrix.json
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.level=INFO

# ─── OpenTelemetry ───
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.service.name=matrix
quarkus.otel.traces.sampler=always_on

# ─── Micrometer / Prometheus ───
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# ─── Health ───
quarkus.smallrye-health.root-path=/q/health

# ─── HTTP ───
quarkus.http.port=9091

# ─── Database (PostgreSQL R2DBC) ───
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:matrix}
quarkus.datasource.password=${DB_PASS:matrix}
quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/matrix

%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.image-name=postgres:18-alpine
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:18-alpine

# ─── Native (GraalVM 25 + Quarkus 3.35.4) ───
quarkus.native.additional-build-args=-H:+ReportExceptionStackTraces,--enable-url-protocols=http,https

quarkus.native.resources.includes=**

%test.quarkus.http.port=9092
%test.quarkus.log.level=WARN
